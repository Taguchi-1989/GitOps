id: hazard-identification
version: "1.0.0"
type: llm-inference

llmConfig:
  model: "gpt-4o"
  systemPrompt: |
    あなたはISO 12100に基づくリスクアセスメントの専門家です。
    作業情報に基づき、該当する危険源を網羅的に特定してください。

    ISO 12100 附属書A 危険源カテゴリ:
    1. 機械的危険源: 押しつぶし、せん断、切傷、巻き込み、引き込み、衝撃、突き刺し、摩擦・擦過、高圧流体噴射
    2. 電気的危険源: 直接接触、間接接触、静電気、熱放射、短絡による溶融物飛散
    3. 熱的危険源: 火傷（高温物体接触）、凍傷（低温物体接触）、熱環境による健康障害
    4. 騒音による危険源: 聴力障害、コミュニケーション妨害、ストレス
    5. 振動による危険源: 手腕振動障害（レイノー症候群）、全身振動障害
    6. 放射による危険源: 低周波電磁場、高周波電磁場、赤外線、紫外線、レーザー、電離放射線
    7. 材料・物質による危険源: 有害物質の接触・吸入、粉じん、可燃性物質、爆発性物質
    8. 人間工学原則無視による危険源: 不自然な姿勢、過度の反復動作、不適切な照明、精神的過負荷
    9. 滑り・つまずき・墜落の危険源: 床面状態、高所作業、開口部
    10. 危険源の組み合わせ: 上記の複合的な状況

    各危険源について以下を特定してください:
    - 危険源の種類とカテゴリ
    - 具体的な危険状態の説明
    - 想定される危害の内容
    - 関連するISO 12100の参照箇所

    必ずJSON形式で回答してください。
  userPromptTemplate: |
    作業名: {{work_name}}
    作業手順: {{work_procedure}}
    使用機器・工具: {{equipment}}
    作業環境: {{work_environment}}
    作業者数: {{worker_count}}
    作業頻度: {{work_frequency}}
    過去事故・ヒヤリハット: {{past_incidents}}
  temperature: 0.2
  maxTokens: 3000

inputSchema:
  type: object
  properties:
    work_name:
      type: string
    work_procedure:
      type: string
    equipment:
      type: string
    work_environment:
      type: string
    worker_count:
      type: string
    work_frequency:
      type: string
    past_incidents:
      type: string
  required:
    - work_name
    - work_procedure
    - equipment

outputSchema:
  type: object
  properties:
    hazards:
      type: array
      items:
        type: object
        properties:
          hazard_id:
            type: string
          category:
            type: string
          description:
            type: string
          harm_description:
            type: string
          iso_reference:
            type: string
    total_count:
      type: number
    coverage_notes:
      type: string
  required:
    - hazards
    - total_count

requiresHumanApproval: true
maxRetries: 2
timeoutMs: 45000

metadata:
  author: "safety-team"
  description: "ISO 12100附属書Aに基づく危険源の網羅的特定を支援するAIタスク"
  tags:
    - risk-assessment
    - hazard
    - iso-12100
    - safety
