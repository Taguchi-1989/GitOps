# 入口ゲート・機密混入検査ポリシー（ガバナンス・ハーネス §4.1）
#
# 外部送出（LLM API 呼び出し）前に、入力テキストへ混入した機密を決定論的に検査する。
# - kind: combination … 識別子＋属性の結合が秘密。マスキングで素通し可（伏字化）。
# - kind: value       … 値そのものが秘密（資格情報・鍵）。検出時点で block + 人間承認。
# - 確信度が confidenceThreshold 未満 … 判定不能として安全側へ倒す（block）。
#
# このゲートは LLM を呼ばない（ING-3）。判定は純関数 scanIngress（決定論）。

id: ingress-secret-gate
version: "1.0.0"
title: 入口ゲート・機密混入検査

# ING-2: この確信度未満の検出は「判定不能」→ fail-safe（block）
confidenceThreshold: 0.5

# POL-3: 判定不能・値型は安全側のみ（block 固定）
failSafe: block

patterns:
  # ---- 結合型（マスキングで素通し可）----
  - id: email
    kind: combination
    description: メールアドレス（識別子＋ドメインの結合）
    regex: "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
    confidence: 0.9

  - id: phone-jp
    kind: combination
    description: 日本の電話番号（ハイフン区切り）
    regex: "0\\d{1,4}-\\d{1,4}-\\d{4}"
    confidence: 0.7

  # ---- 値型（検出＝block。マスキング無効）----
  - id: private-key-block
    kind: value
    description: PEM 秘密鍵ヘッダ
    regex: "-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----"
    confidence: 0.99

  - id: aws-access-key
    kind: value
    description: AWS アクセスキーID
    regex: "AKIA[0-9A-Z]{16}"
    confidence: 0.95

  - id: github-pat
    kind: value
    description: GitHub Personal Access Token
    regex: "ghp_[A-Za-z0-9]{36}"
    confidence: 0.95

  - id: slack-token
    kind: value
    description: Slack トークン
    regex: "xox[baprs]-[A-Za-z0-9-]{10,}"
    confidence: 0.9

  - id: jwt
    kind: value
    description: JSON Web Token
    regex: "eyJ[A-Za-z0-9_-]+\\.eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+"
    confidence: 0.9

  - id: bearer-token
    kind: value
    description: Authorization Bearer トークン
    regex: "bearer\\s+[A-Za-z0-9._-]{16,}"
    flags: i
    confidence: 0.8

  - id: api-key-assignment
    kind: value
    description: api_key / secret / token への代入
    regex: "(?:api[_-]?key|secret|token)\\s*[:=]\\s*['\"]?[A-Za-z0-9._-]{16,}"
    flags: i
    confidence: 0.7

  - id: password-assignment
    kind: value
    description: password への代入
    regex: "password\\s*[:=]\\s*\\S+"
    flags: i
    confidence: 0.6
