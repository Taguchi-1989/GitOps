# Git差分向け機密検査ポリシー
#
# 外部入力向け ingress-secret-gate の email / password assignment などは、
# ソースコード・seed・CI設定の通常記述を機密値として誤検知するため含めない。
# Git差分では、値そのものから高い確度で判定できる資格情報形式を検査する。

id: gitops-secret-gate
version: '1.0.0'
title: Git差分・機密値検査
confidenceThreshold: 0.5
failSafe: block

patterns:
  - id: private-key-block
    kind: value
    description: PEM秘密鍵ヘッダ
    regex: '-----BEGIN (?:RSA |EC |OPENSSH |DSA |PGP )?PRIVATE KEY-----'
    confidence: 0.99

  - id: aws-access-key
    kind: value
    description: AWSアクセスキーID
    regex: 'AKIA[0-9A-Z]{16}'
    confidence: 0.95

  - id: github-pat
    kind: value
    description: GitHubトークン
    regex: 'gh[pousr]_[A-Za-z0-9]{36,}'
    confidence: 0.95

  - id: slack-token
    kind: value
    description: Slackトークン
    regex: 'xox[baprs]-[A-Za-z0-9-]{10,}'
    confidence: 0.9

  - id: jwt
    kind: value
    description: JSON Web Token
    regex: "eyJ[A-Za-z0-9_-]+\\.eyJ[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+"
    confidence: 0.9

  - id: bearer-token
    kind: value
    description: Authorization Bearerトークン
    regex: "bearer\\s+[A-Za-z0-9._-]{12,}"
    flags: i
    confidence: 0.8
